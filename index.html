<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michele Capocasale – Orionware</title>
  <meta name="description" content="Bigliettino da visita virtuale di Michele Capocasale, CEO & Co-Founder di Orionware Srl." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --gs: #B8254B;
      --ge: #2E1A4A;
      --gm: #6B1A5A;
      --grad: linear-gradient(135deg, var(--gs), var(--ge));
      --dark:  #07040f;
      --card:  rgba(14, 9, 26, 0.88);
      --text:  #ede8f8;
      --muted: #7a6e96;
      --line:  rgba(255,255,255,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform;
    }

    .orb-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(184,37,75,0.55) 0%, transparent 68%);
      top: -200px; left: -160px;
      animation: drift1 28s ease-in-out infinite;
    }

    .orb-2 {
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(46,26,74,0.7) 0%, transparent 68%);
      bottom: -180px; right: -140px;
      animation: drift2 34s ease-in-out infinite;
    }

    .orb-3 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(107,26,90,0.45) 0%, transparent 68%);
      top: 45%; left: 55%;
      animation: drift3 22s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%     { transform: translate(40px,-40px) scale(1.08); }
      70%     { transform: translate(-20px,30px) scale(0.94); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      35%     { transform: translate(-50px,30px) scale(1.06); }
      65%     { transform: translate(30px,-20px) scale(0.96); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-40px,-50px) scale(1.12); }
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--card);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 28px;
      border: 1px solid rgba(184,37,75,0.22);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 0 60px rgba(184,37,75,0.13),
        0 32px 80px rgba(0,0,0,0.75);
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── HEADER ── */
    .card-header {
      background: var(--grad);
      padding: 36px 36px 32px;
      position: relative;
      overflow: hidden;
    }

    /* radial glow inside header */
    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(255,255,255,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* subtle grid texture */
    .card-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .company-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    .logo-text {
      height: 15px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .identity {
      position: relative;
      z-index: 1;
    }

    .identity h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .identity .role {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 5px 13px;
      backdrop-filter: blur(4px);
    }

    .role-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── BODY ── */
    .card-body {
      padding: 6px 0;
      position: relative;
      overflow: hidden;
    }

    .watermark {
      position: absolute;
      right: -28px;
      top: 68%;
      transform: translateY(-50%);
      width: 210px;
      height: 210px;
      background: url('assets/logo-mark.png') center/contain no-repeat;
      opacity: 0.055;
      pointer-events: none;
      z-index: 0;
    }

    /* ── CONTACT ROWS ── */
    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 15px 36px;
      text-decoration: none;
      color: inherit;
      position: relative;
      z-index: 1;
      transition: background 0.2s;
      cursor: pointer;
    }

    .contact-item + .contact-item { border-top: 1px solid var(--line); }

    /* gradient left indicator on hover */
    .contact-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--grad);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transform: scaleY(0.4);
      transition: opacity 0.2s, transform 0.2s;
    }

    .contact-item:hover { background: rgba(184,37,75,0.06); }
    .contact-item:hover::before { opacity: 1; transform: scaleY(1); }

    .contact-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(184,37,75,0.35);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .contact-item:hover .contact-icon {
      box-shadow: 0 6px 22px rgba(184,37,75,0.5);
      transform: scale(1.06);
    }

    .contact-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-info { display: flex; flex-direction: column; gap: 2px; }

    .contact-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .contact-value {
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── SAVE BUTTON ── */
    .btn-wrap {
      padding: 18px 36px 26px;
      position: relative;
      z-index: 1;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: var(--grad);
      box-shadow: 0 4px 24px rgba(184,37,75,0.4);
      transition: box-shadow 0.3s, transform 0.2s;
    }

    .btn-save::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 0;
      width: 60%;
      background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.22) 50%, transparent 80%);
      transform: translateX(-150%);
      animation: shinePass 2.6s ease-in-out infinite;
    }

    @keyframes shinePass {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(280%); }
    }

    .btn-save:hover {
      box-shadow: 0 6px 32px rgba(184,37,75,0.6);
      transform: translateY(-2px);
    }
    .btn-save:active { transform: translateY(0); }

    .btn-save svg {
      width: 16px; height: 16px;
      stroke: #fff; stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
      fill: none; flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .btn-save span { position: relative; z-index: 1; }

    /* ── QR CODE ── */
    .card-qr {
      border-top: 1px solid var(--line);
      padding: 24px 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .qr-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.35);
    }

    #qr-el canvas { display: block; }

    /* ── FOOTER ── */
    .card-footer {
      border-top: 1px solid var(--line);
      padding: 13px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-footer > span {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .piva-badge {
      font-size: 0.65rem;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- CARD -->
<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="company-row">
      <img class="logo-mark" src="assets/logo-mark.png" alt="Orionware logo" />
      <img class="logo-text" src="assets/logo-text.png" alt="Orionware" />
    </div>
    <div class="identity">
      <h1>Michele Capocasale</h1>
      <span class="role"><span class="role-dot"></span>CEO &amp; Co-Founder</span>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body">

    <div class="watermark"></div>

    <a class="contact-item" href="tel:+390554934297">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77A16 16 0 0 0 15.23 16l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Telefono fisso</span>
        <span class="contact-value">+39 055 4934297</span>
      </div>
    </a>

    <a class="contact-item" href="tel:+393515771445">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Cellulare</span>
        <span class="contact-value">+39 351 577 1445</span>
      </div>
    </a>

    <a class="contact-item" href="mailto:michele.capocasale@orionware.io">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Email</span>
        <span class="contact-value">michele.capocasale@orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://www.orionware.io" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sito web</span>
        <span class="contact-value">www.orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://maps.google.com/?q=Via+Vittorio+Veneto+19,+52028+Terranuova+Bracciolini+AR" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sede</span>
        <span class="contact-value">Via Vittorio Veneto 19, 52028<br>Terranuova Bracciolini (AR)</span>
      </div>
    </a>

    <div class="btn-wrap">
      <button class="btn-save" onclick="saveContact()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Salva Contatto</span>
      </button>
    </div>

  </div>

  <!-- QR CODE -->
  <div class="card-qr">
    <p class="qr-label">Scansiona per aprire</p>
    <div class="qr-wrapper">
      <div id="qr-el"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <span>Orionware Srl</span>
    <span class="piva-badge">P.IVA 02498180518</span>
  </div>

</div>

<script>
  (function initQR() {
    const el   = document.getElementById('qr-el');
    const size = 180;

    new QRCode(el, {
      text:         'https://phantomrazgriz.github.io/biglietto-michele/',
      width:        size,
      height:       size,
      colorDark:    '#2E1A4A',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // overlay logo mark after QR renders
    setTimeout(() => {
      const canvas = el.querySelector('canvas');
      if (!canvas) return;
      const ctx      = canvas.getContext('2d');
      const logoSize = Math.round(size * 0.23);
      const x        = (size - logoSize) / 2;
      const y        = (size - logoSize) / 2;
      const pad      = 6;

      // white square behind logo for QR readability
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2);

      const img  = new Image();
      img.onload = () => ctx.drawImage(img, x, y, logoSize, logoSize);
      img.src    = 'assets/logo-mark.png';
    }, 200);
  })();

  function saveContact() {
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Michele Capocasale',
      'N:Capocasale;Michele;;;',
      'ORG:Orionware Srl',
      'TITLE:CEO & Co-Founder',
      'TEL;TYPE=WORK,VOICE:+390554934297',
      'TEL;TYPE=CELL:+393515771445',
      'EMAIL;TYPE=WORK:michele.capocasale@orionware.io',
      'ADR;TYPE=WORK:;;Via Vittorio Veneto 19;Terranuova Bracciolini;AR;52028;Italy',
      'URL:https://www.orionware.io',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Michele_Capocasale_Orionware.vcf';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
