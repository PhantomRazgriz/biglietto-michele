<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michele Capocasale – Orionware</title>
  <meta name="description" content="Bigliettino da visita virtuale di Michele Capocasale, CEO & Co-Founder di Orionware Srl." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --g-start: #B8254B;
      --g-end:   #2E1A4A;
      --gradient: linear-gradient(135deg, var(--g-start), var(--g-end));
      --bg:       #f0edf5;
      --card-bg:  #ffffff;
      --text:     #1a1025;
      --muted:    #7a7088;
      --line:     #ede9f4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* ── CARD SHELL ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 48px rgba(46, 26, 74, 0.14);
      overflow: hidden;
    }

    /* ── HEADER ── */
    .card-header {
      background: var(--gradient);
      padding: 40px 36px 36px;
      position: relative;
      overflow: hidden;
    }

    /* watermark logo in header background */
    .card-header::before {
      content: '';
      position: absolute;
      right: -28px;
      top: -28px;
      width: 200px;
      height: 200px;
      background: url('assets/logo-mark.png') center/contain no-repeat;
      opacity: 0.1;
      pointer-events: none;
    }

    /* company row */
    .company-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    .logo-text {
      height: 16px;
      filter: brightness(0) invert(1);
    }

    /* person identity */
    .identity {
      position: relative;
      z-index: 1;
    }

    .identity h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .identity .role {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
    }

    /* ── BODY ── */
    .card-body {
      padding: 8px 0;
      position: relative;
      overflow: hidden;
    }

    /* watermark on right side of body */
    .card-body::after {
      content: '';
      position: absolute;
      right: -24px;
      bottom: -24px;
      width: 160px;
      height: 160px;
      background: url('assets/logo-mark.png') center/contain no-repeat;
      opacity: 0.055;
      pointer-events: none;
      z-index: 0;
    }

    /* ── CONTACT ROWS ── */
    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 36px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      position: relative;
      z-index: 1;
    }

    .contact-item:hover { background: #faf8fd; }

    .contact-item + .contact-item {
      border-top: 1px solid var(--line);
    }

    .contact-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-info { display: flex; flex-direction: column; gap: 2px; }

    .contact-label {
      font-size: 0.67rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .contact-value {
      font-size: 0.93rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
    }

    /* ── SAVE BUTTON ── */
    .btn-wrap {
      padding: 20px 36px 28px;
      position: relative;
      z-index: 1;
    }

    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 20px;
      background: var(--gradient);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-save:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn-save:active { opacity: 1;    transform: none; }

    .btn-save svg {
      width: 17px;
      height: 17px;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .card-footer {
      border-top: 1px solid var(--line);
      padding: 14px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-footer span {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .piva-badge {
      font-size: 0.68rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="company-row">
      <img class="logo-mark" src="assets/logo-mark.png" alt="Orionware logo" />
      <img class="logo-text" src="assets/logo-text.png" alt="Orionware" />
    </div>
    <div class="identity">
      <h1>Michele Capocasale</h1>
      <span class="role">CEO &amp; Co-Founder</span>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="card-body">

    <a class="contact-item" href="tel:+390554934297">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77A16 16 0 0 0 15.23 16l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Telefono fisso</span>
        <span class="contact-value">+39 055 4934297</span>
      </div>
    </a>

    <a class="contact-item" href="tel:+393515771445">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Cellulare</span>
        <span class="contact-value">+39 351 577 1445</span>
      </div>
    </a>

    <a class="contact-item" href="mailto:michele.capocasale@orionware.io">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Email</span>
        <span class="contact-value">michele.capocasale@orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://www.orionware.io" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sito web</span>
        <span class="contact-value">www.orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://maps.google.com/?q=Via+Vittorio+Veneto+19,+52028+Terranuova+Bracciolini+AR" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sede</span>
        <span class="contact-value">Via Vittorio Veneto 19, 52028<br>Terranuova Bracciolini (AR)</span>
      </div>
    </a>

    <div class="btn-wrap">
      <button class="btn-save" onclick="saveContact()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Salva Contatto
      </button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <span>Orionware Srl</span>
    <span class="piva-badge">P.IVA 02498180518</span>
  </div>

</div>

<script>
  function saveContact() {
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Michele Capocasale',
      'N:Capocasale;Michele;;;',
      'ORG:Orionware Srl',
      'TITLE:CEO & Co-Founder',
      'TEL;TYPE=WORK,VOICE:+390554934297',
      'TEL;TYPE=CELL:+393515771445',
      'EMAIL;TYPE=WORK:michele.capocasale@orionware.io',
      'ADR;TYPE=WORK:;;Via Vittorio Veneto 19;Terranuova Bracciolini;AR;52028;Italy',
      'URL:https://www.orionware.io',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Michele_Capocasale_Orionware.vcf';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
