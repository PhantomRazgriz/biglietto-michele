<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michele Capocasale – Orionware</title>
  <meta name="description" content="Bigliettino da visita virtuale di Michele Capocasale, CEO & Co-Founder di Orionware Srl." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gradient-start: #B8254B;
      --gradient-end:   #2E1A4A;
      --gradient: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      --bg: #f7f6f9;
      --card-bg: #ffffff;
      --text-primary: #1a1025;
      --text-secondary: #6b6178;
      --divider: #ece9f1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ---------- CARD ---------- */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 4px 40px rgba(46, 26, 74, 0.12);
    }

    /* top gradient bar */
    .card-header {
      background: var(--gradient);
      padding: 36px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      position: relative;
    }

    /* subtle circular watermark in header */
    .card-header::after {
      content: '';
      position: absolute;
      right: -30px;
      bottom: -40px;
      width: 160px;
      height: 160px;
      background: url('assets/logo-mark.png') center/contain no-repeat;
      opacity: 0.12;
      pointer-events: none;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      filter: brightness(0) invert(1);
    }

    .logo-text {
      height: 18px;
      filter: brightness(0) invert(1);
    }

    .identity {
      position: relative;
      z-index: 1;
    }

    .identity h1 {
      font-size: 1.55rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .identity p {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ---------- CONTACTS ---------- */
    .card-body {
      padding: 28px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--divider);
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s;
    }
    .contact-item:last-of-type { border-bottom: none; }
    .contact-item:hover { opacity: 0.7; }

    .contact-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-info { display: flex; flex-direction: column; }

    .contact-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .contact-value {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text-primary);
      margin-top: 2px;
    }

    /* ---------- SAVE BUTTON ---------- */
    .btn-save {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--gradient);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 24px;
      text-align: center;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-save:active { opacity: 1;   transform: translateY(0);    }

    /* ---------- FOOTER ---------- */
    .card-footer {
      padding: 0 32px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-footer span {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .piva-badge {
      font-size: 0.7rem;
      color: var(--text-secondary);
      border: 1px solid var(--divider);
      border-radius: 6px;
      padding: 2px 7px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="logo-row">
      <img class="logo-mark" src="assets/logo-mark.png" alt="Orionware logo mark" />
      <img class="logo-text" src="assets/logo-text.png" alt="Orionware" />
    </div>
    <div class="identity">
      <h1>Michele Capocasale</h1>
      <p>CEO &amp; Co-Founder</p>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body">

    <a class="contact-item" href="tel:+390554934297">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77A16 16 0 0 0 15.23 16l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Telefono fisso</span>
        <span class="contact-value">+39 055 4934297</span>
      </div>
    </a>

    <a class="contact-item" href="tel:+393515771445">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Cellulare</span>
        <span class="contact-value">+39 351 577 1445</span>
      </div>
    </a>

    <a class="contact-item" href="mailto:michele.capocasale@orionware.io">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Email</span>
        <span class="contact-value">michele.capocasale@orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://www.orionware.io" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sito web</span>
        <span class="contact-value">www.orionware.io</span>
      </div>
    </a>

    <a class="contact-item" href="https://maps.google.com/?q=Via+Vittorio+Veneto+19,+52028+Terranuova+Bracciolini+AR" target="_blank" rel="noopener">
      <div class="contact-icon">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="contact-info">
        <span class="contact-label">Sede</span>
        <span class="contact-value">Via Vittorio Veneto 19, 52028<br>Terranuova Bracciolini (AR)</span>
      </div>
    </a>

    <button class="btn-save" onclick="saveContact()">
      ⬇ Salva Contatto
    </button>
  </div>

  <!-- FOOTER -->
  <div class="card-footer">
    <span>Orionware Srl</span>
    <span class="piva-badge">P.IVA 02498180518</span>
  </div>

</div>

<script>
  function saveContact() {
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Michele Capocasale',
      'N:Capocasale;Michele;;;',
      'ORG:Orionware Srl',
      'TITLE:CEO & Co-Founder',
      'TEL;TYPE=WORK,VOICE:+390554934297',
      'TEL;TYPE=CELL:+393515771445',
      'EMAIL;TYPE=WORK:michele.capocasale@orionware.io',
      'ADR;TYPE=WORK:;;Via Vittorio Veneto 19;Terranuova Bracciolini;AR;52028;Italy',
      'URL:https://www.orionware.io',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Michele_Capocasale_Orionware.vcf';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
